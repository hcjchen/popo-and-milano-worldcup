<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Popo World Cup Daily Quiz Shootout ⚽</title>
<style>
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; }
  body {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; gap:10px; padding:16px;
    background:linear-gradient(160deg,#bfe9ff 0%,#e8f7ff 100%);
    font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif; color:#5a3d1a;
  }
  h1 { margin:0; font-size:clamp(17px,3.4vw,26px); letter-spacing:.5px; text-align:center; }
  h1 span { color:#e6932b; }
  #hud { display:flex; gap:10px; font-weight:bold; font-size:15px; flex-wrap:wrap; justify-content:center; }
  #hud .pill { background:#fff8e6; border:2px solid #f0c14b; border-radius:999px; padding:4px 12px; }
  #stage { position:relative; width:720px; max-width:96vw; }
  canvas { width:100%; display:block; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,.18); cursor:crosshair; touch-action:none; background:#3fa34d; }
  #hint { font-size:14px; opacity:.85; min-height:20px; text-align:center; }

  .overlay { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center;
    gap:12px; padding:18px; border-radius:16px; text-align:center; background:rgba(20,30,40,.62); backdrop-filter:blur(3px); color:#fff; }
  .overlay.show { display:flex; }
  .card { background:#fff8e6; color:#5a3d1a; border:3px solid #f0c14b; border-radius:18px;
    padding:18px; width:min(580px,94%); box-shadow:0 8px 24px rgba(0,0,0,.25); }
  .cat { font-size:12px; font-weight:bold; letter-spacing:1px; text-transform:uppercase; color:#e6932b; }
  .qtext { font-size:clamp(16px,2.3vw,21px); font-weight:bold; margin:8px 0 12px; }
  .opts { display:grid; grid-template-columns:1fr 1fr; gap:9px; }
  @media (max-width:520px){ .opts { grid-template-columns:1fr; } }
  .opt { font:inherit; font-weight:bold; cursor:pointer; padding:11px 10px; border-radius:12px;
    border:2px solid #e6b23a; background:#fff; color:#5a3d1a; transition:transform .05s, background .15s; }
  .opt:hover { background:#fff3cf; } .opt:active { transform:translateY(1px); }
  .opt.correct { background:#46c95f; border-color:#2f9d44; color:#fff; }
  .opt.wrong   { background:#eb5757; border-color:#c0392b; color:#fff; }
  .opt:disabled { cursor:default; }
  #qtimer { height:8px; background:#eadfae; border-radius:6px; margin:12px 0 4px; overflow:hidden; }
  #qtimerfill { height:100%; width:100%; background:linear-gradient(90deg,#46c95f,#f2c94c,#eb5757); transition:width .12s linear; }
  .toast { font-size:13.5px; min-height:18px; margin-top:8px; line-height:1.35; }
  .big { font:inherit; font-weight:bold; font-size:17px; padding:11px 24px; border:none; cursor:pointer;
    background:#e6932b; color:#fff; border-radius:999px; box-shadow:0 4px 0 #b9731c; margin:4px; }
  .big.alt { background:#3a7bd5; box-shadow:0 4px 0 #2a5ca0; }
  .big.green { background:#2f9d44; box-shadow:0 4px 0 #237a34; }
  .big:active { transform:translateY(2px); box-shadow:0 2px 0 #b9731c; }
  .nameField { font:inherit; font-size:18px; font-weight:bold; text-align:center; padding:10px 14px;
    border:2px solid #e6b23a; border-radius:12px; width:min(280px,80%); color:#5a3d1a; }
  .result-line { font-size:17px; margin:5px 0; }
  .marks { font-size:26px; letter-spacing:3px; margin:6px 0; }
  .score-big { font-size:40px; font-weight:bold; color:#e6932b; }
</style>
</head>
<body>
  <h1>🐱 Popo <span>World Cup Daily Quiz Shootout</span> ⚽</h1>
  <div id="hud">
    <div class="pill">Day <span id="day">–</span></div>
    <div class="pill">Q <span id="qnum">0</span>/5</div>
    <div class="pill">✔ <span id="correct">0</span></div>
    <div class="pill">⚽ <span id="goals">0</span></div>
    <div class="pill">⏱ <span id="time">–</span></div>
    <div class="pill">★ <span id="best">0</span></div>
  </div>

  <div id="stage">
    <canvas id="game" width="720" height="480"></canvas>

    <div id="startOv" class="overlay show">
      <div class="card">
        <div class="cat" id="startDate"></div>
        <div class="qtext">What's your name?</div>
        <input id="nameInput" class="nameField" maxlength="14" autocomplete="off" />
        <p style="margin:12px 0;font-size:14.5px;line-height:1.5">
          Answer 5 World Cup questions — harder ones score more! Each one you get right lets Popo take a penalty kick past Milano the keeper. ⚽
        </p>
        <button class="big" id="startBtn">Kick Off!</button>
      </div>
    </div>

    <div id="quizOv" class="overlay">
      <div class="card">
        <div class="cat" id="qcat">Question</div>
        <div class="qtext" id="qtext">…</div>
        <div class="opts" id="qopts"></div>
        <div id="qtimer"><div id="qtimerfill"></div></div>
        <div class="toast" id="qfeedback">&nbsp;</div>
      </div>
    </div>

    <div id="resultOv" class="overlay">
      <div class="card">
        <div class="cat">Full time 🏆 · Day <span id="resDay"></span></div>
        <div class="marks" id="resMarks"></div>
        <div class="score-big" id="finalScore">0</div>
        <div class="result-line" id="resCorrect"></div>
        <div class="result-line" id="resGoals"></div>
        <div class="result-line" id="resGrade" style="font-style:italic"></div>
        <div>
          <button class="big alt" id="shareBtn">Share</button>
          <button class="big" id="againBtn">Play Again</button>
        </div>
        <div class="toast" id="shareToast">&nbsp;</div>
      </div>
    </div>
  </div>

  <div id="hint">Type your name to begin today's challenge.</div>

/* ===================== Daily selection by tier ===================== */
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
function shuffleRng(arr, rng){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(rng()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

const today = new Date();
const dayKey = Math.floor(Date.UTC(today.getFullYear(),today.getMonth(),today.getDate())/86400000);
const baseKey = Math.floor(Date.UTC(2026,5,14)/86400000);
const dayNumber = dayKey - baseKey + 1;
const dateStr = today.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});

function dailyQuestions(){
  const rng = mulberry32(dayKey||1);
  const pools = { E:shuffleRng(BANK.filter(q=>q.d==='E'),rng),
                  M:shuffleRng(BANK.filter(q=>q.d==='M'),rng),
                  H:shuffleRng(BANK.filter(q=>q.d==='H'),rng) };
  const templates = [['E','E','M','M','H'], ['E','E','M','H','H']];
  const tmpl = templates[Math.floor(rng()*templates.length)];
  const idx = {E:0,M:0,H:0};
  return tmpl.map(t => pools[t][idx[t]++]);
}

/* ===================== Game state ===================== */
const GOAL = { x: W/2-150, y:70, w:300, h:90 };
const BALL_HOME = { x: W/2, y: H-96 };
const BEST_KEY='purinWCBest', NAME_KEY='purinWCName';
const PTS={E:100,M:150,H:250}; // harder questions are worth more

let state='idle', kick='ready';
let quiz=[], qIndex=0, correctCount=0, totalGoals=0, quizPoints=0, results=[];
let answered=false, quizTime=10, penaltyTime=0;
let ball, keeper, charging=false, power=0, aim={x:W/2,y:GOAL.y};
let flash=null, lastTs=0, cheerIdx=0, kickAnimT=0;
let playerName = localStorage.getItem(NAME_KEY) || '';
let best = parseInt(localStorage.getItem(BEST_KEY)||'0',10) || 0;

// gentler difficulty curve
function effDiff(){ return Math.min(0.8, qIndex*0.11 + totalGoals*0.02); }
function resetBall(){ ball={x:BALL_HOME.x,y:BALL_HOME.y,vx:0,vy:0,r:14,scale:1,spin:0}; }
function newKeeper(){
  const d=effDiff();
  keeper={ x:W/2, y:GOAL.y+GOAL.h-18, w:44+d*22, h:70, dir:1, speed:80+d*80,
           diving:false, targetX:W/2, lean:0 };
  cheerIdx++;
}

function updateHud(){
  els.day.textContent=dayNumber;
  els.qnum.textContent = state==='gameover'?5:Math.min(qIndex+1,5);
  els.correct.textContent=correctCount; els.goals.textContent=totalGoals; els.best.textContent=best;
  els.time.textContent = state==='quiz'?Math.ceil(quizTime)+'s' : state==='penalty'?Math.ceil(penaltyTime)+'s' : '–';
}
function show(ov){ [els.startOv,els.quizOv,els.resultOv].forEach(o=>o.classList.remove('show')); if(ov) ov.classList.add('show'); }

/* ===================== Flow ===================== */
function startGame(){
  playerName = (els.nameInput.value||'').trim().slice(0,14) || playerName || 'Champ';
  localStorage.setItem(NAME_KEY, playerName);
  quiz = dailyQuestions();
  qIndex=0; correctCount=0; totalGoals=0; quizPoints=0; results=[];
  resetBall(); showQuiz();
}
function showQuiz(){
  state='quiz'; answered=false; quizTime=10;
  const item=quiz[qIndex];
  const tier = item.d==='E'?'Easy':item.d==='M'?'Medium':'Hard';
  els.qcat.textContent=`Q${qIndex+1} of 5 · ${item.c} · ${tier} (${PTS[item.d]} pts)`;
  els.qtext.textContent=item.q;
  els.qfeedback.innerHTML='&nbsp;'; els.qtimerfill.style.width='100%'; els.qopts.innerHTML='';
  const rng=mulberry32(dayKey*131 + qIndex*7 + 3);
  const order=shuffleRng(item.o.map((t,i)=>({t,correct:i===item.a})), rng);
  order.forEach(opt=>{ const b=document.createElement('button'); b.className='opt'; b.textContent=opt.t;
    b.onclick=()=>answer(b,opt.correct,order,item); els.qopts.appendChild(b); });
  els.hint.textContent='Pick the right answer within 10 seconds!';
  show(els.quizOv); updateHud();
}
function revealCorrect(order){ [...els.qopts.children].forEach((b,i)=>{ b.disabled=true; if(order[i].correct) b.classList.add('correct'); }); }
function answer(btn,isCorrect,order,item){
  if(answered) return; answered=true; revealCorrect(order);
  if(isCorrect){
    correctCount++; quizPoints+=PTS[item.d]; results.push(true);
    els.qfeedback.textContent=`✅ Correct! +${PTS[item.d]} pts. `+item.f+'  (Penalty kick next!)';
    updateHud(); setTimeout(startPenalty,2000);
  }else{
    btn.classList.add('wrong'); results.push(false);
    els.qfeedback.textContent='❌ Nope. '+item.f;
    setTimeout(nextQuiz,2400);
  }
}
function timeoutAnswer(){
  if(answered) return; answered=true;
  const item=quiz[qIndex];
  [...els.qopts.children].forEach(b=>{ b.disabled=true; if(b.textContent===item.o[item.a]) b.classList.add('correct'); });
  results.push(false);
  els.qfeedback.textContent="⏰ Time's up! "+item.f;
  setTimeout(nextQuiz,2400);
}
function startPenalty(){
  show(null); state='penalty'; kick='ready';
  penaltyTime=10; power=0; charging=false; resetBall(); newKeeper();
  els.hint.textContent='Hold to charge, release to shoot — go, '+playerName+'!';
  updateHud();
}
function endPenalty(){ nextQuiz(); }
function nextQuiz(){ qIndex++; if(qIndex>=5) endGame(); else showQuiz(); }
function endGame(){
  state='gameover';
  const score=quizPoints + totalGoals*50;
  if(score>best){ best=score; localStorage.setItem(BEST_KEY,String(best)); }
  els.resDay.textContent=dayNumber;
  els.resMarks.textContent=results.map(r=>r?'✅':'❌').join('');
  els.finalScore.textContent=score;
  els.resCorrect.textContent=`🧠 Quiz: ${correctCount}/5 correct · ${quizPoints} pts`;
  els.resGoals.textContent=`⚽ Goals: ${totalGoals} · ${totalGoals*50} pts`;
  let grade='Keep practising';
  if(score>=850) grade='World Cup Legend! 🐱👑';
  else if(score>=600) grade='Star Striker! 🌟';
  else if(score>=350) grade='Solid squad player! 💪';
  els.resGrade.textContent=`${playerName}: ${grade}`;
  els.shareToast.innerHTML='&nbsp;';
  els.hint.textContent='Great game! Share your score, or play again.';
  show(els.resultOv); updateHud();
}
function shareText(){
  const score=quizPoints + totalGoals*50;
  const marks=results.map(r=>r?'✅':'❌').join('');
  return `🐱⚽ ${playerName}'s Popo World Cup Quiz — Day #${dayNumber} (${dateStr})\n`+
         `${marks}  ${correctCount}/5\n`+
         `⚽ Goals: ${totalGoals}   🏆 Score: ${score}\nCan you beat me?`;
}
async function doShare(){
  const text=shareText();
  try{ if(navigator.share){ await navigator.share({title:'Popo World Cup Quiz', text}); els.shareToast.textContent='Shared! 🎉'; return; } }
  catch(e){ return; }
  els.shareToast.textContent='Sharing isn’t available on this device.';
}

/* ===================== Input ===================== */
function pos(e){ const r=cv.getBoundingClientRect(); const p=(e.touches?e.touches[0]:e);
  return {x:(p.clientX-r.left)*W/r.width, y:(p.clientY-r.top)*H/r.height}; }
function canKick(){ return state==='penalty' && kick==='ready'; }
function onMove(e){ if(!canKick()) return; aim=pos(e); }
function onDown(e){ if(!canKick()) return; e.preventDefault(); charging=true; power=0; aim=pos(e); }
function onUp(e){ if(!canKick()||!charging) return; e.preventDefault(); charging=false; shoot(); }
cv.addEventListener('mousemove',onMove); cv.addEventListener('mousedown',onDown); window.addEventListener('mouseup',onUp);
cv.addEventListener('touchmove',e=>{onMove(e); if(canKick()) e.preventDefault();},{passive:false});
cv.addEventListener('touchstart',onDown,{passive:false}); window.addEventListener('touchend',onUp,{passive:false});
els.startBtn.onclick=startGame; els.againBtn.onclick=startGame; els.shareBtn.onclick=doShare;
els.nameInput.addEventListener('keydown',e=>{ if(e.key==='Enter') startGame(); });

function shoot(){
  const dx=aim.x-ball.x, dy=aim.y-ball.y, len=Math.hypot(dx,dy)||1;
  const speed=320+power*9;
  ball.vx=dx/len*speed; ball.vy=dy/len*speed; ball.spin=(Math.random()-.5)*0.4; kickAnimT=0.35; kick='flying';
}
function resolveKick(goal,msg){
  if(goal){ totalGoals++; flash={msg,color:'#1f9d3a',t:1.0}; }
  else flash={msg,color:'#c0392b',t:1.0};
  kick='resolve'; updateHud();
  setTimeout(()=>{ if(state!=='penalty') return;
    if(penaltyTime>0){ resetBall(); newKeeper(); power=0; kick='ready'; } else endPenalty(); },600);
}

/* ===================== Update ===================== */
function update(dt){
  if(state==='quiz' && !answered){
    quizTime=Math.max(0,quizTime-dt); els.qtimerfill.style.width=(quizTime/10*100)+'%';
    if(quizTime<=0) timeoutAnswer();
  }
  if(state==='penalty'){
    penaltyTime=Math.max(0,penaltyTime-dt);
    if(kickAnimT>0) kickAnimT=Math.max(0,kickAnimT-dt);
    if(charging && kick==='ready') power=Math.min(100,power+dt*80);
    if(kick==='flying'){
      ball.x+=ball.vx*dt; ball.y+=ball.vy*dt; ball.vx+=ball.spin*60*dt;
      ball.scale=Math.max(0.45, ball.y/H);
      if(ball.x<ball.r||ball.x>W-ball.r){ ball.vx*=-0.7; ball.x=Math.max(ball.r,Math.min(W-ball.r,ball.x)); }
      if(!keeper.diving && ball.y<GOAL.y+150 && ball.vy<0){
        const t=(ball.y-GOAL.y)/(-ball.vy); let px=ball.x+ball.vx*t;
        const err=(1-effDiff())*300+90;   // weaker keeper: large aiming error
        keeper.targetX=Math.max(GOAL.x+keeper.w/2, Math.min(GOAL.x+GOAL.w-keeper.w/2, px+(Math.random()*2-1)*err));
        keeper.diving=true;
      }
      if(ball.y<keeper.y+keeper.h/2 && ball.y>keeper.y-keeper.h/2 &&
         Math.abs(ball.x-keeper.x)<keeper.w/2 + ball.r*ball.scale) return resolveKick(false,'Saved! 🧤');
      if(ball.y<=GOAL.y){ const inMouth=ball.x>GOAL.x && ball.x<GOAL.x+GOAL.w;
        return resolveKick(inMouth, inMouth?'GOAL! 🎉':'Missed! 😅'); }
    }
    if(keeper.diving){
      const dx=keeper.targetX-keeper.x;
      keeper.x += Math.sign(dx)*Math.min(Math.abs(dx), 700*dt);   // slower dive reach
      keeper.lean=Math.max(-0.55,Math.min(0.55,dx*0.012));
    } else if(kick!=='resolve'){
      keeper.x += keeper.dir*keeper.speed*dt;
      const L=GOAL.x+keeper.w/2, R=GOAL.x+GOAL.w-keeper.w/2;
      if(keeper.x<L){keeper.x=L;keeper.dir=1;} if(keeper.x>R){keeper.x=R;keeper.dir=-1;}
      keeper.lean*=(1-Math.min(1,dt*6));
    }
    if(penaltyTime<=0 && kick==='ready') endPenalty();
  }
}

/* ===================== Drawing ===================== */
function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function drawField(){
  for(let i=0;i<8;i++){ ctx.fillStyle=i%2?'#379343':'#3fa34d'; ctx.fillRect(0,i*H/8,W,H/8); }
  ctx.strokeStyle='rgba(255,255,255,.7)'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(W/2,GOAL.y+GOAL.h+150,120,0.15*Math.PI,0.85*Math.PI); ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.85)'; ctx.beginPath(); ctx.arc(BALL_HOME.x,BALL_HOME.y+24,4,0,7); ctx.fill();
}
function drawGoal(){
  const {x,y,w,h}=GOAL;
  ctx.fillStyle='rgba(255,255,255,.16)'; ctx.fillRect(x,y-30,w,h+30);
  ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=1;
  for(let i=0;i<=w;i+=14){ ctx.beginPath(); ctx.moveTo(x+i,y-30); ctx.lineTo(x+i,y+h); ctx.stroke(); }
  for(let j=-30;j<=h;j+=14){ ctx.beginPath(); ctx.moveTo(x,y+j); ctx.lineTo(x+w,y+j); ctx.stroke(); }
  ctx.strokeStyle='#fff'; ctx.lineWidth=7; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(x,y+h); ctx.lineTo(x,y-30); ctx.lineTo(x+w,y-30); ctx.lineTo(x+w,y+h); ctx.stroke();
}
// Milano — Alier's tuxedo (black-and-white) cat, guarding the goal
function drawKeeper(){
  const k=keeper, hw=k.w/2; ctx.save(); ctx.translate(k.x,k.y); ctx.rotate(k.lean);
  const BLACK='#2b2b30', WHITE='#fafafa', PINK='#e79aa0', GLOVE='#ffcf3f', GREEN='#9cc06a';
  // gloved paws (white legs + yellow keeper gloves) — reach out when diving
  const reach=k.diving?18:5;
  ctx.strokeStyle=WHITE; ctx.lineWidth=9; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-hw+6,6); ctx.lineTo(-hw-reach,1); ctx.moveTo(hw-6,6); ctx.lineTo(hw+reach,1); ctx.stroke();
  ctx.fillStyle=GLOVE; ctx.beginPath(); ctx.arc(-hw-reach,-1,8,0,7); ctx.arc(hw+reach,-1,8,0,7); ctx.fill();
  // body (black) fills the hitbox width
  ctx.fillStyle=BLACK; roundRect(-hw,-6,k.w,40,14); ctx.fill();
  // white chest/belly
  ctx.fillStyle=WHITE; ctx.beginPath(); ctx.ellipse(0,18,hw*0.55,15,0,0,7); ctx.fill();
  // head (black)
  ctx.fillStyle=BLACK; ctx.beginPath(); ctx.arc(0,-19,17,0,7); ctx.fill();
  // ears
  ctx.beginPath(); ctx.moveTo(-15,-31); ctx.lineTo(-3,-20); ctx.lineTo(-18,-16); ctx.closePath();
  ctx.moveTo(15,-31); ctx.lineTo(3,-20); ctx.lineTo(18,-16); ctx.closePath(); ctx.fill();
  // white muzzle + face blaze
  ctx.fillStyle=WHITE; ctx.beginPath(); ctx.ellipse(0,-12,9,7,0,0,7); ctx.fill();
  ctx.beginPath(); ctx.moveTo(0,-31); ctx.lineTo(-3.5,-15); ctx.lineTo(3.5,-15); ctx.closePath(); ctx.fill();
  // eyes
  ctx.fillStyle=GREEN; ctx.beginPath(); ctx.ellipse(-7,-21,3,3.6,0,0,7); ctx.ellipse(7,-21,3,3.6,0,0,7); ctx.fill();
  ctx.fillStyle='#222'; ctx.beginPath(); ctx.ellipse(-7,-21,1.2,3,0,0,7); ctx.ellipse(7,-21,1.2,3,0,0,7); ctx.fill();
  // nose
  ctx.fillStyle=PINK; ctx.beginPath(); ctx.moveTo(0,-11); ctx.lineTo(-2.3,-13.6); ctx.lineTo(2.3,-13.6); ctx.closePath(); ctx.fill();
  ctx.restore();
}
// Popo — Alier's orange-and-white cat
function drawPopo(x,y,s=1,kickT=0){
  const kp=Math.max(0,Math.min(1,kickT/0.35));
  ctx.save(); ctx.translate(x,y); ctx.scale(s,s);
  const ORANGE='#e6913c', ORANGE_D='#cf7a28', WHITE='#fcf7ef', PINK='#e79aa0', INK='#4a3a2a', GREEN='#8fb95f';
  // shadow
  ctx.fillStyle='rgba(0,0,0,.16)'; ctx.beginPath(); ctx.ellipse(0,56,48,11,0,0,7); ctx.fill();
  ctx.rotate(-0.18*kp); // lean into the kick
  // curling orange tail
  ctx.strokeStyle=ORANGE; ctx.lineWidth=13; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(32,44); ctx.quadraticCurveTo(70,34,60,4); ctx.stroke();
  // body: orange back, white chest
  ctx.fillStyle=ORANGE; ctx.beginPath(); ctx.ellipse(0,28,36,30,0,0,7); ctx.fill();
  ctx.fillStyle=WHITE; ctx.beginPath(); ctx.ellipse(0,34,23,24,0,0,7); ctx.fill();
  // white front paws
  ctx.fillStyle=WHITE; ctx.beginPath(); ctx.ellipse(-14,52,10,7,0,0,7); ctx.ellipse(14,52,10,7,0,0,7); ctx.fill();
  ctx.strokeStyle=ORANGE_D; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(-14,47); ctx.lineTo(-14,52); ctx.moveTo(14,47); ctx.lineTo(14,52); ctx.stroke();
  // ears (orange outer + pink inner)
  ctx.fillStyle=ORANGE;
  ctx.beginPath(); ctx.moveTo(-36,-30); ctx.lineTo(-18,-6); ctx.lineTo(-46,-6); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(36,-30); ctx.lineTo(18,-6); ctx.lineTo(46,-6); ctx.closePath(); ctx.fill();
  ctx.fillStyle=PINK;
  ctx.beginPath(); ctx.moveTo(-33,-23); ctx.lineTo(-23,-9); ctx.lineTo(-39,-9); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(33,-23); ctx.lineTo(23,-9); ctx.lineTo(39,-9); ctx.closePath(); ctx.fill();
  // head (white base)
  ctx.fillStyle=WHITE; ctx.beginPath(); ctx.ellipse(0,-6,35,30,0,0,7); ctx.fill();
  // orange cap patches with a white blaze between
  ctx.fillStyle=ORANGE;
  ctx.beginPath(); ctx.ellipse(-18,-18,16,15,0,0,7); ctx.fill();
  ctx.beginPath(); ctx.ellipse(18,-18,16,15,0,0,7); ctx.fill();
  ctx.fillStyle=WHITE; ctx.beginPath(); ctx.moveTo(0,-34); ctx.lineTo(-8,-2); ctx.lineTo(8,-2); ctx.closePath(); ctx.fill();
  // eyes (green with pupils + shine)
  ctx.fillStyle=GREEN; ctx.beginPath(); ctx.ellipse(-13,-4,5.5,6.5,0,0,7); ctx.ellipse(13,-4,5.5,6.5,0,0,7); ctx.fill();
  ctx.fillStyle=INK; ctx.beginPath(); ctx.ellipse(-13,-4,2.2,5,0,0,7); ctx.ellipse(13,-4,2.2,5,0,0,7); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-14.5,-6,1.3,0,7); ctx.arc(11.5,-6,1.3,0,7); ctx.fill();
  // pink nose
  ctx.fillStyle=PINK; ctx.beginPath(); ctx.moveTo(0,7); ctx.lineTo(-4.5,2); ctx.lineTo(4.5,2); ctx.closePath(); ctx.fill();
  // mouth (cat smile)
  ctx.strokeStyle=INK; ctx.lineWidth=1.6; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(0,7); ctx.lineTo(0,11); ctx.stroke();
  ctx.beginPath(); ctx.arc(-4,11,4,0,Math.PI*0.6); ctx.stroke();
  ctx.beginPath(); ctx.arc(4,11,4,Math.PI*0.4,Math.PI); ctx.stroke();
  // whiskers
  ctx.strokeStyle='rgba(120,90,60,.65)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(-7,4); ctx.lineTo(-32,0); ctx.moveTo(-7,7); ctx.lineTo(-32,9);
  ctx.moveTo(7,4); ctx.lineTo(32,0); ctx.moveTo(7,7); ctx.lineTo(32,9); ctx.stroke();
  // kicking leg (white paw swings up-forward toward the ball)
  if(kp>0){ ctx.strokeStyle=WHITE; ctx.lineWidth=12; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(2,46); ctx.lineTo(10+22*kp, 44-56*kp); ctx.stroke();
    ctx.fillStyle=WHITE; ctx.beginPath(); ctx.arc(10+22*kp, 44-56*kp, 7, 0, 7); ctx.fill(); }
  ctx.restore();
}
const CHEERS=['Go, %, go!','You got this, %!','Score it, %!','Come on, %!','Aim true, %!'];
function drawCheer(text){
  ctx.save(); ctx.font='bold 15px "Trebuchet MS",sans-serif'; ctx.textAlign='center';
  const w=Math.max(90, ctx.measureText(text).width+24);
  const bx=BALL_HOME.x+96, by=BALL_HOME.y-2;
  ctx.fillStyle='#fff'; ctx.strokeStyle='#e6b23a'; ctx.lineWidth=2;
  roundRect(bx-w/2, by-18, w, 30, 12); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bx-w/2+18,by+10); ctx.lineTo(bx-w/2+2,by+22); ctx.lineTo(bx-w/2+30,by+11); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#5a3d1a'; ctx.fillText(text, bx, by+2); ctx.restore();
}
function drawBall(){
  const r=ball.r*ball.scale; ctx.save(); ctx.translate(ball.x,ball.y);
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(0,0,r,0,7); ctx.fill();
  ctx.strokeStyle='#222'; ctx.lineWidth=Math.max(1,r*0.12); ctx.stroke();
  ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(0,0,r*0.34,0,7); ctx.fill(); ctx.restore();
}
function drawAim(){
  if(!canKick()) return;
  const dx=aim.x-ball.x, dy=aim.y-ball.y;
  for(let i=1;i<=6;i++){ const t=i/7; ctx.globalAlpha=.5-t*0.4; ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(ball.x+dx*t,ball.y+dy*t,5-t*2,0,7); ctx.fill(); }
  ctx.globalAlpha=1;
  const pw=160,px=ball.x-pw/2,py=ball.y+34;
  ctx.fillStyle='rgba(0,0,0,.35)'; roundRect(px,py,pw,12,6); ctx.fill();
  const g=ctx.createLinearGradient(px,0,px+pw,0); g.addColorStop(0,'#7dd87d'); g.addColorStop(.5,'#f2c94c'); g.addColorStop(1,'#eb5757');
  ctx.fillStyle=g; roundRect(px,py,pw*power/100,12,6); ctx.fill();
}
let staticBall={x:W/2+70,y:H/2+70,vx:0,vy:0,r:16,scale:1,spin:0};
function render(){
  ctx.clearRect(0,0,W,H); drawField(); drawGoal();
  if(state==='penalty'){
    drawKeeper(); drawAim();
    drawPopo(BALL_HOME.x, BALL_HOME.y+40, 0.92, kickAnimT);
    if(kick==='ready') drawCheer(CHEERS[cheerIdx%CHEERS.length].replace('%',playerName||'Champ'));
    if(ball) drawBall();
  }else{
    drawPopo(W/2, H/2+10, 1.15);
    const b=ball; ball=staticBall; drawBall(); ball=b;
  }
  if(flash && flash.t>0){
    ctx.globalAlpha=Math.min(1,flash.t); ctx.fillStyle=flash.color;
    ctx.font='bold 46px "Trebuchet MS",sans-serif'; ctx.textAlign='center';
    ctx.fillText(flash.msg, W/2, H/2-60); ctx.globalAlpha=1;
  }
}
function loop(ts){
  const dt=Math.min(0.05,(ts-lastTs)/1000)||0; lastTs=ts;
  update(dt);
  if(state==='quiz'||state==='penalty') updateHud();
  if(flash) flash.t-=dt;
  render(); requestAnimationFrame(loop);
}

/* ===================== Init ===================== */
els.startDate.textContent=`Daily Challenge · Day #${dayNumber} · ${dateStr}`;
els.day.textContent=dayNumber; els.best.textContent=best;
if(playerName) els.nameInput.value=playerName;
resetBall(); requestAnimationFrame(loop);
</script>
